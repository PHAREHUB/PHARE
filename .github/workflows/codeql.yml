name: "CodeQL"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  schedule:
    - cron: "42 19 * * 4"

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [ python, cpp ]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install system deps (openmpi, hdf5, ccache,...)
        if: ${{ matrix.language == 'cpp' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y libopenmpi-dev openmpi-bin libhdf5-openmpi-dev ccache
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt


      - name: Configure CMake
        if: ${{ matrix.language == 'cpp' }}
        run: |
          mkdir build; cd build; cmake ..; cd ..; rm -rf build
          cd subprojects/samrai && mkdir build && cd build
          cmake .. -DENABLE_SAMRAI_TESTS=OFF -DCMAKE_BUILD_TYPE=RelWithDebInfo
          make -j2 && sudo make install && cd ../.. && rm -rf samrai

      - name: Configure (cpp)
        if: ${{ matrix.language == 'cpp' }}
        run: mkdir build; cd build; cmake .. -DCMAKE_BUILD_TYPE=Debug

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          config-file: ./.github/codeql-config.yml
          languages: ${{ matrix.language }}
          queries: +security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3
        if: ${{ matrix.language == 'python' }}

      - name: Build cpp
        if: ${{ matrix.language == 'cpp' }}
        run: cd build; make

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
